site_name: InkQuest — Narrative Quest Engine
site_description: Документация к моду InkQuest (Narrative Quest Engine, Fabric 1.20.1)
site_url: https://k4k-is-me.github.io/ink-quest-docs/
docs_dir: docs

# Ссылки в .md записаны от корня доков (напр. /ПАПКА/Файл.md).
# Резолвим их относительно docs_dir и проверяем якоря при сборке.
validation:
  links:
    absolute_links: relative_to_docs
    unrecognized_links: warn
  anchors: warn

theme:
  name: material
  language: en
  font:
    text: Lora            # книжная серифная с кириллицей — основной текст
    code: JetBrains Mono  # моноширинный для JSON-примеров
  icon:
    logo: material/book-open-page-variant
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: brown
      accent: amber
      toggle:
        icon: material/weather-night
        name: Ночной том
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: brown
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Пергамент

extra_css:
  - stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/k4k-is-me/ink-quest-docs/issues
      name: Report an issue

plugins:
  - search:
      lang: [en, ru]
  - i18n:
      docs_structure: suffix          # en — без суффикса (.md), ru — с суффиксом (.ru.md)
      fallback_to_default: true       # нет перевода → показываем версию языка по умолчанию
      reconfigure_material: true      # переключатель языков в шапке Material
      reconfigure_search: true        # поиск под текущий язык
      languages:
        - locale: en
          name: English
          default: true
          build: true
        - locale: ru
          name: Русский
          build: true
          nav_translations:
            Overview: Обзор
            Getting started: Начало
            How quests work: Как устроены квесты
            Datapack reference: Справочник датапака
            Player view: Что видит игрок
            Command API: Командное API
            Quest patterns: Паттерны квестов
            Troubleshooting: Решение проблем

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower

nav:
  - Overview: index.md
  - Getting started:
      - getting-started/quick-start.md
  - How quests work:
      - how-quests-work/quest-structure.md
      - how-quests-work/active-stage.md
      - how-quests-work/quest-and-task-statuses.md
      - how-quests-work/quest-dependencies.md
      - how-quests-work/repeatable-quests.md
      - how-quests-work/pinning.md
  - Datapack reference:
      - datapack-reference/quest-file-format.md
      - datapack-reference/task-completion-conditions.md
      - datapack-reference/task-lifecycle-hooks.md
      - datapack-reference/quest-items.md
  - Player view:
      - player-view/player-interface.md
      - player-view/items.md
  - Command API:
      - command-api/command-reference.md
      - command-api/integration-with-commands.md
  - Quest patterns:
      - quest-patterns/quest-patterns.md
      - quest-patterns/quest-note.md
      - quest-patterns/quest-chain.md
      - quest-patterns/waiting-for-an-event.md
      - quest-patterns/branch-and-choice-memory.md
      - quest-patterns/repeatable-quest.md
      - quest-patterns/global-quest.md
      - quest-patterns/task-with-two-outcomes.md
      - quest-patterns/granting-quests-to-new-player.md
      - quest-patterns/scroll-in-chest.md
  - Troubleshooting:
      - troubleshooting/common-questions-and-errors.md
